name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # project.yml / project.device.yml が ../HermesShared をpath依存で参照する
      - name: Checkout HermesShared (sibling)
        run: git clone --depth 1 https://github.com/mailkaseijinbiz-web/HermesShared.git ../HermesShared

      - name: Clear extended attributes
        run: xattr -cr . || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project (device spec, no Share extension)
        run: xcodegen generate --spec project.device.yml

      - name: Build and test
        run: |
          xcodebuild -project HermesAgent.xcodeproj -scheme HermesAgent \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
