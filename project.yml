name: HermesAgent
options:
  bundleIdPrefix: com.custom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "27.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "576D2UUHH5"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  HermesAgent:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HermesAgent
      - path: Shared
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - target: HermesAgentWidget
    entitlements:
      path: HermesAgent/HermesAgent.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.custom.hermesagent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.custom.hermesagent
        PRODUCT_NAME: HermesAgent
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # App icon: icon.png lives in HermesAgent/Assets.xcassets/AppIcon.appiconset.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: HermesAgent/Info.plist
      properties:
        CFBundleDisplayName: Hermes
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: "QRコードをスキャンしてサーバーに接続します"
        NSPhotoLibraryUsageDescription: "チャットに画像を添付するために写真へアクセスします"
        NSLocalNetworkUsageDescription: "Mac上のHermes Agentサーバーに接続します"
        # Google Sign-In: replace REPLACE_WITH_GOOGLE_CLIENT_ID with your iOS OAuth client ID.
        # The app gracefully skips Google auth while this placeholder is present.
        GIDClientID: "947567328488-sj5r3br5agdn6fcj17f7mrreip51hsas.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.custom.hermesagent.deeplink
            CFBundleURLSchemes:
              - "hermesagent"
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.custom.hermesagent.googlesignin
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.947567328488-sj5r3br5agdn6fcj17f7mrreip51hsas"
        # NSAllowsLocalNetworking is intentionally OMITTED: when present, iOS ignores
        # NSAllowsArbitraryLoads, and NSAllowsLocalNetworking does NOT cover Tailscale's
        # 100.64.0.0/10 (CGNAT) range — which would block http://100.x.x.x:9119.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  HermesAgentWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HermesAgentWidget
      - path: Shared
    entitlements:
      path: HermesAgentWidget/HermesAgentWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.custom.hermesagent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.custom.hermesagent.widget
        PRODUCT_NAME: HermesAgentWidget
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: HermesAgentWidget/Info.plist
      properties:
        CFBundleDisplayName: Hermes
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
